{% extends "basic_app/basic_app_base.html" %}
{% block body_block %}
<h1 class="page-header">Комеди клубууд!</h1>
<div class="row">
    {% for club in clubList %}
        <div class="col-sm-6 col-md-4" style="margin-bottom: 20px;">
            <div class="thumbnail" style="margin-bottom: 0; box-shadow: 0 1px 3px rgba(0,0,0,.12); min-height: 200px;">
                <div class="caption">
                    <h3 style="margin-top: 0;">
                        <a href="{% url 'basic_app:detail' pk=club.pk %}">{{ club.name }}</a>
                    </h3>
                    <p class="text-muted" style="margin-bottom: 16px;">
                        <span class="glyphicon glyphicon-map-marker" aria-hidden="true"></span>
                        {{ club.location }}
                    </p>
                    <p style="margin-bottom: 0;">
                        <a class="btn btn-primary btn-sm" href="{% url 'basic_app:detail' pk=club.pk %}">Дэлгэрэнгүй</a>
                    </p>
                </div>
            </div>
        </div>
    {% empty %}
        <div class="col-xs-12">
            <p class="lead text-muted">Клуб алга.</p>
            <p><a class="btn btn-success" href="{% url 'basic_app:create' %}">Клуб нэмэх</a></p>
        </div>
    {% endfor %}
</div>
{% endblock %}
