{% extends "basic_app/basic_app_base.html" %}
{% block body_block %}
<div class="jumbotron">
    <h2>Нэвтрэх</h2>
    <form action="{% url 'basic_app:user_login' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Хэрэглэгчийн нэр</label>
            <input class="form-control" type="text" name="username" placeholder="Нэр оруулна уу" required>
        </div>
        <div class="form-group">
            <label for="password">Нууц үг</label>
            <input class="form-control" type="password" name="password" required>
        </div>
        <input type="submit" class="btn btn-primary" value="Нэвтрэх">
    </form>
</div>
{% endblock %}
