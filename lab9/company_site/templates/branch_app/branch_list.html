{% extends "base.html" %}

{% block content %}
<h2>Branch List</h2>
<p><a href="{% url 'branch_app:branch_create' %}">+ Add Branch</a></p>

{% if branches %}
<table border="1" cellpadding="6">
    <thead>
        <tr>
            <th>Name</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for branch in branches %}
        <tr>
            <td>{{ branch.name }}</td>
            <td>{{ branch.address }}</td>
            <td>{{ branch.phone }}</td>
            <td>
                <a href="{% url 'branch_app:branch_update' branch.pk %}">Edit</a>
                <a href="{% url 'branch_app:branch_delete' branch.pk %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No branches found.</p>
{% endif %}
{% endblock %}
