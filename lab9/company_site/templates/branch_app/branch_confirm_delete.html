{% extends "base.html" %}

{% block content %}
<h2>Delete Branch</h2>
<p>Are you sure you want to delete "{{ branch.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>
<p><a href="{% url 'branch_app:branch_list' %}">Cancel</a></p>
{% endblock %}
