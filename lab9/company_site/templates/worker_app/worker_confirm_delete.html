{% extends "base.html" %}

{% block content %}
<h2>Delete Worker</h2>
<p>Are you sure you want to delete "{{ worker }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>
<p><a href="{% url 'worker_app:worker_list' %}">Cancel</a></p>
{% endblock %}
