<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker</title>
</head>
<body>
  <h3>Worker</h3>
  <form method="POST" action="create/">
    {% csrf_token %}
    <input type="text" name="txtWorker" placeholder="Enter worker name">
    <select name="branch_id" required>
      <option value="">Select branch</option>
      {% for branch in branches %}
      <option value="{{ branch.id }}">{{ branch.bname }}</option>
      {% endfor %}
    </select>
    <input type="submit" value="Add Worker">
  </form>
  <br>
  {% if workers %}
  <table border="1">
    <tr>
      <th>Ажилтны нэр</th>
      <th>Салбар</th>
      <th>Үйлдэл</th>
    </tr>
    {% for worker in workers %}
    <tr>
      <td>{{ worker.wname }}</td>
      <td>{{ worker.branch.bname }}</td>
      <td>
        <a href="/worker/edit/{{ worker.id }}/">Засах</a>
        <a href="/worker/delete/{{ worker.id }}/">Устгах</a>
      </td>
    </tr>
    {% endfor %}
  </table>
  {% else %}
  <p>No workers found!!!</p>
  {% endif %}
  <a href="/">Back</a>
</body>
</html>
