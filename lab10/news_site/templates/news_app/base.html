<!doctype html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Lab10 News{% endblock %}</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
      header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
      a { color: #1d4ed8; text-decoration: none; }
      a:hover { text-decoration: underline; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border: 1px solid #e5e7eb; padding: 10px; text-align: left; }
      th { background: #f9fafb; }
      .actions { display: flex; gap: 10px; }
      .muted { color: #6b7280; font-size: 14px; }
      .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
      .btn { display: inline-block; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; }
      .btn-danger { border-color: #ef4444; color: #b91c1c; }
      input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; }
      textarea { min-height: 140px; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div style="font-weight:700; font-size: 18px;"><a href="{% url 'news_list' %}">Lab10 — Мэдээ</a></div>
        <div class="muted">ModelForm ашигласан CRUD</div>
      </div>
      <nav class="actions">
        <a class="btn" href="{% url 'news_create' %}">Мэдээ нэмэх</a>
        <a class="btn" href="/admin/">Admin</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </body>
</html>
