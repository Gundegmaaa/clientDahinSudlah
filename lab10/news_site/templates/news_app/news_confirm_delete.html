{% extends "news_app/base.html" %}

{% block title %}Мэдээ устгах{% endblock %}

{% block content %}
  <h2>Мэдээ устгах</h2>

  <div class="card">
    <p><strong>{{ news.title }}</strong> мэдээг устгах уу?</p>
    <p class="muted">Төрөл: {{ news.category }} · Огноо: {{ news.created_at|date:"Y-m-d H:i" }}</p>

    <form method="post" class="actions">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Тийм, устгая</button>
      <a class="btn" href="{% url 'news_list' %}">Болих</a>
    </form>
  </div>
{% endblock %}
