<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zodiac Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <a href="/zodiac/" class="btn btn-outline-secondary btn-sm mb-3">Back to list</a>

    {% if zodiac %}
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3">{{ zodiac.name }}</h1>
                <p class="text-muted mb-2">ID: {{ zodiac.id }}</p>
                <p class="mb-3">{{ zodiac.description }}</p>
                <span class="badge text-bg-primary">Element: {{ zodiac.element }}</span>
            </div>
        </div>
    {% else %}
        <div class="alert alert-warning">Zodiac not found.</div>
    {% endif %}
</div>
</body>
</html>
