<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zodiac List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">12 Zodiac Animals</h1>
        <a class="btn btn-outline-primary" href="/blog/">Go to Blogs</a>
    </div>

    <div class="row g-3">
        {% for zodiac in zodiacs %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 card-title">{{ zodiac.id }}. {{ zodiac.name }}</h2>
                        <p class="card-text text-muted mb-3">{{ zodiac.description }}</p>
                        <span class="badge text-bg-secondary mb-3">Element: {{ zodiac.element }}</span>
                        <div>
                            <a class="btn btn-sm btn-primary" href="/zodiac/{{ zodiac.id }}/">View details</a>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
