<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Blog Posts</h1>
        <a class="btn btn-outline-primary" href="/zodiac/">Go to Zodiac</a>
    </div>

    <div class="list-group shadow-sm">
        {% for blog in blogs %}
            <a href="/blog/{{ blog.id }}/" class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between">
                    <h2 class="h5 mb-1">{{ blog.title }}</h2>
                    <small>#{{ blog.id }}</small>
                </div>
                <p class="mb-1 text-muted">{{ blog.content|truncatechars:90 }}</p>
                <small>Author: {{ blog.author }}</small>
            </a>
        {% endfor %}
    </div>
</div>
</body>
</html>
