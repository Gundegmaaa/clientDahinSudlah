<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <a href="/blog/" class="btn btn-outline-secondary btn-sm mb-3">Back to blogs</a>

    {% if blog %}
        <article class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3">{{ blog.title }}</h1>
                <p class="text-muted mb-3">Author: {{ blog.author }} | ID: {{ blog.id }}</p>
                <p class="mb-0">{{ blog.content }}</p>
            </div>
        </article>
    {% else %}
        <div class="alert alert-warning">Blog post not found.</div>
    {% endif %}
</div>
</body>
</html>
